<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Music Purchase Finder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0d12;
            --surface: rgba(255, 255, 255, 0.03);
            --surface-2: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.08);
            --border-strong: rgba(255, 255, 255, 0.14);
            --text: #e8eaf0;
            --text-muted: #8b90a0;
            --accent: #7c5cff;
            --accent-2: #22d3ee;
            --accent-soft: rgba(124, 92, 255, 0.14);
            --radius: 14px;
            --radius-lg: 20px;
        }

        * { box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            max-width: 860px;
            margin: 0 auto;
            padding: 56px 24px 80px;
            background: var(--bg);
            background-image:
                radial-gradient(ellipse 60% 40% at 15% -5%, rgba(124, 92, 255, 0.16), transparent 60%),
                radial-gradient(ellipse 50% 35% at 90% 0%, rgba(34, 211, 238, 0.10), transparent 60%);
            background-attachment: fixed;
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        ::selection { background: var(--accent-soft); }

        /* ---------- Hero ---------- */

        .hero { margin-bottom: 36px; }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--text-muted);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 6px 14px;
            margin-bottom: 18px;
            background: var(--surface);
        }

        .eyebrow::before {
            content: '';
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            box-shadow: 0 0 10px rgba(124, 92, 255, 0.8);
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            line-height: 1.1;
            margin: 0 0 10px;
            background: linear-gradient(100deg, #ffffff 20%, #b8bce6 60%, #8b90c8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            color: var(--text-muted);
            font-size: 1.02rem;
            margin: 0;
            max-width: 48ch;
        }

        /* ---------- Search bar ---------- */

        .search-container {
            display: flex;
            gap: 10px;
            padding: 8px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            backdrop-filter: blur(12px);
            margin-bottom: 28px;
            transition: border-color 0.25s ease, box-shadow 0.25s ease;
        }

        .search-container:focus-within {
            border-color: rgba(124, 92, 255, 0.55);
            box-shadow: 0 0 0 4px rgba(124, 92, 255, 0.12);
        }

        input {
            flex: 1;
            min-width: 0;
            padding: 14px 16px;
            border: none;
            border-radius: calc(var(--radius-lg) - 8px);
            font-size: 15px;
            font-family: inherit;
            background: transparent;
            color: var(--text);
        }

        input::placeholder { color: var(--text-muted); }
        input:focus { outline: none; }

        button {
            padding: 14px 26px;
            background: linear-gradient(135deg, var(--accent), #5b3df5);
            color: white;
            border: none;
            border-radius: calc(var(--radius-lg) - 8px);
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.2s ease, filter 0.2s ease;
            box-shadow: 0 4px 18px rgba(124, 92, 255, 0.35);
            white-space: nowrap;
        }

        button:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(124, 92, 255, 0.45);
        }

        button:active { transform: translateY(0); }

        /* ---------- Results ---------- */

        #results:not(:empty) {
            background: var(--surface);
            padding: 28px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            backdrop-filter: blur(12px);
            animation: rise 0.35s ease both;
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.01em;
            margin: 0 0 6px;
        }

        h3 {
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin: 34px 0 12px;
            padding-top: 22px;
            border-top: 1px solid var(--border);
        }

        p {
            margin: 10px 0;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        ul { padding-left: 20px; }
        li { margin: 6px 0; color: var(--text-muted); }

        a {
            color: #b1a4ff;
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px solid transparent;
            transition: color 0.2s ease, border-color 0.2s ease;
        }

        a:hover {
            color: var(--accent-2);
            border-bottom-color: currentColor;
        }

        .error {
            color: #ff8f8a;
            background: rgba(255, 90, 84, 0.08);
            padding: 14px 18px;
            border-radius: var(--radius);
            border: 1px solid rgba(255, 90, 84, 0.25);
            font-size: 0.95rem;
        }

        .searching {
            color: var(--text-muted);
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .searching::before {
            content: '';
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid var(--border-strong);
            border-top-color: var(--accent);
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ---------- Store selector ---------- */

        .store-selector {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }

        .store-selector label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            white-space: nowrap;
        }

        select {
            flex: 1;
            padding: 9px 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            background: var(--surface-2);
            color: var(--text);
            cursor: pointer;
            transition: border-color 0.2s ease;
        }

        select:hover, select:focus { border-color: var(--border-strong); outline: none; }
        select option { background: #161925; color: var(--text); }

        /* ---------- Cards & media ---------- */

        .product-card {
            display: flex;
            gap: 16px;
            padding: 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }

        .product-image {
            width: 96px;
            height: 96px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid var(--border);
            flex-shrink: 0;
        }

        .product-info { flex: 1; min-width: 0; }

        .product-title {
            font-weight: 600;
            font-size: 0.98rem;
            margin-bottom: 2px;
            color: var(--text);
        }

        .product-info > div:not(.product-title):not(.product-price):not(.product-preview) {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .product-price {
            display: inline-block;
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--accent-2);
            background: rgba(34, 211, 238, 0.1);
            border: 1px solid rgba(34, 211, 238, 0.25);
            border-radius: 999px;
            padding: 2px 10px;
            margin: 8px 0 4px;
        }

        .product-preview { margin: 10px 0; }

        audio {
            width: 100%;
            height: 38px;
            border-radius: 999px;
        }

        .bandcamp-container,
        .soundcloud-container {
            background: var(--surface);
            padding: 12px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }

        iframe {
            border-radius: 8px;
            display: block;
            margin: 0 auto;
        }

        /* ---------- Carousel ---------- */

        .carousel-container {
            position: relative;
            padding: 0 52px;
            margin: 18px 0;
            overflow: hidden;
            width: calc(100% - 104px);
        }

        .tracks-container {
            display: flex;
            scroll-behavior: smooth;
            overflow: hidden;
            scroll-snap-type: x mandatory;
            gap: 20px;
        }

        .track-item {
            flex: 0 0 100%;
            scroll-snap-align: start;
            min-width: 100%;
            padding: 4px;
        }

        .carousel-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            padding: 0;
            background: var(--surface-2);
            border: 1px solid var(--border-strong);
            border-radius: 50%;
            color: var(--text);
            font-size: 20px;
            line-height: 1;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
            box-shadow: none;
            transition: background 0.2s ease, border-color 0.2s ease, transform 0.15s ease;
        }

        .carousel-arrow:hover {
            background: var(--accent-soft);
            border-color: rgba(124, 92, 255, 0.5);
            transform: translateY(-50%) scale(1.06);
            filter: none;
            box-shadow: none;
        }

        .carousel-arrow.prev { left: 0; }
        .carousel-arrow.next { right: 0; }

        .track-counter {
            text-align: center;
            margin-top: 12px;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.06em;
            color: var(--text-muted);
        }

        @media (max-width: 560px) {
            body { padding: 32px 16px 60px; }
            .search-container { flex-direction: column; }
            button { width: 100%; }
            .carousel-container { padding: 0 44px; width: calc(100% - 88px); }
        }
    </style>
</head>
<body>
    <div class="hero">
        <div class="eyebrow">For DJs &amp; diggers</div>
        <h1>Music Purchase Finder</h1>
        <p class="tagline">Paste a SoundCloud, YouTube, or Spotify link — or search by name — and find where to buy the track.</p>
    </div>
    <div class="search-container">
        <input type="text" id="search-input" placeholder="Paste a track URL or type artist / title…" onkeypress="if(event.key === 'Enter') performSearch()">
        <button onclick="performSearch()">Search</button>
    </div>
    <div id="results"></div>

    <script>
        let currentCountry = 'US';
        // Remember the last search so the store selector can re-run it without
        // interpolating user/scraped input into inline event handlers (XSS).
        let lastSearchUrl = null;
        let lastSearchKeywords = null;

        // iTunes storefront countries offered in the selector
        const COUNTRIES = [
            ['US', 'United States'], ['GB', 'United Kingdom'], ['DE', 'Germany'],
            ['FR', 'France'], ['IT', 'Italy'], ['ES', 'Spain'], ['CA', 'Canada'],
            ['JP', 'Japan'], ['AU', 'Australia'], ['BR', 'Brazil'], ['MX', 'Mexico'],
            ['IN', 'India'], ['NL', 'Netherlands'], ['SE', 'Sweden']
        ];

        // Escape text before inserting it into innerHTML. All titles, artists,
        // and URLs here come from third-party pages we scrape, so they are
        // untrusted and must never be injected raw.
        function escapeHtml(value) {
            if (value == null) return '';
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        // Only allow http(s) URLs into href/src attributes; anything else
        // (javascript:, data:, etc.) collapses to a harmless '#'.
        function safeUrl(value) {
            if (value == null) return '#';
            try {
                const parsed = new URL(value, window.location.origin);
                if (parsed.protocol === 'http:' || parsed.protocol === 'https:') {
                    return parsed.href;
                }
            } catch (e) { /* fall through */ }
            return '#';
        }

        // Load detected storefront country on page load
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch('/get-country');
                const data = await response.json();
                if (data.country) {
                    currentCountry = data.country;
                }
            } catch (error) {
                console.log('Could not detect storefront country:', error);
            }
        });

        // Detect if input is URL or keyword
        function isURL(str) {
            try {
                const url = new URL(str);
                return url.protocol === 'http:' || url.protocol === 'https:';
            } catch {
                // Try with http:// prefix
                try {
                    const url = new URL('http://' + str);
                    return url.hostname.includes('.') && 
                           (url.hostname.includes('soundcloud.com') || 
                            url.hostname.includes('youtube.com') || 
                            url.hostname.includes('youtu.be') || 
                            url.hostname.includes('spotify.com'));
                } catch {
                    return false;
                }
            }
        }

        async function performSearch() {
            const input = document.getElementById('search-input').value.trim();
            if (!input) {
                alert('Please enter a URL or search keywords');
                return;
            }

            if (isURL(input)) {
                await searchTrack(input);
            } else {
                await searchKeywords(input);
            }
        }

        function scrollCarousel(direction, containerId) {
            const container = document.querySelector(containerId ? `#${containerId}` : '.tracks-container');
            if (!container) return;
            
            const items = container.querySelectorAll('.track-item');
            if (items.length === 0) return;
            
            const currentScroll = container.scrollLeft;
            const itemWidth = items[0].offsetWidth;
            
            let currentIndex = Math.round(currentScroll / itemWidth);
            
            if (direction === 'next') {
                currentIndex = Math.min(currentIndex + 1, items.length - 1);
            } else {
                currentIndex = Math.max(currentIndex - 1, 0);
            }
            
            container.scrollTo({
                left: currentIndex * itemWidth,
                behavior: 'smooth'
            });
            
            const counter = container.parentElement.querySelector('.track-counter');
            if (counter) {
                updateTrackCounter(currentIndex + 1, items.length, counter);
            }
        }

        function updateTrackCounter(current, total, element) {
            if (element) {
                element.textContent = `Track ${current} of ${total}`;
            }
        }

        // Shared renderers used by both URL search and keyword search.
        // All dynamic values are escaped; idSuffix distinguishes carousel
        // container ids between the two search modes.

        function renderBandcampSection(bandcamp, idSuffix) {
            let html = '<h3>Bandcamp:</h3>';
            if (bandcamp && bandcamp.tracks && bandcamp.tracks.length > 0) {
                const tracksWithEmbed = bandcamp.tracks.filter(t => t.embed_html);
                if (tracksWithEmbed.length > 0) {
                    const containerId = `bandcamp-tracks-${idSuffix}`;
                    html += `<p>Browse tracks and previews:</p>`;
                    html += `
                        <div class="carousel-container">
                            <button class="carousel-arrow prev" onclick="scrollCarousel('prev', '${containerId}')">‹</button>
                            <button class="carousel-arrow next" onclick="scrollCarousel('next', '${containerId}')">›</button>
                            <div class="tracks-container" id="${containerId}">
                    `;
                    tracksWithEmbed.forEach(track => {
                        html += `
                            <div class="track-item">
                                <div class="bandcamp-container">
                                    ${track.embed_html}
                                </div>
                                <div class="track-actions" style="margin-top: 10px; text-align: center;">
                                    <a href="${escapeHtml(safeUrl(track.url))}" target="_blank" rel="noopener noreferrer">View on Bandcamp</a>
                                </div>
                            </div>
                        `;
                    });
                    html += `
                            </div>
                            <div class="track-counter">Track 1 of ${tracksWithEmbed.length}</div>
                        </div>
                    `;
                }
                const tracksWithoutEmbed = bandcamp.tracks.filter(t => !t.embed_html);
                if (tracksWithoutEmbed.length > 0) {
                    html += `<p>Additional results (${tracksWithoutEmbed.length}):</p><ul>`;
                    tracksWithoutEmbed.forEach(track => {
                        html += `<li><a href="${escapeHtml(safeUrl(track.url))}" target="_blank" rel="noopener noreferrer">${escapeHtml(track.title || 'View on Bandcamp')}</a></li>`;
                    });
                    html += `</ul>`;
                }
            }
            if (bandcamp && bandcamp.search_url) {
                html += `<p>🔍 <a href="${escapeHtml(safeUrl(bandcamp.search_url))}" target="_blank" rel="noopener noreferrer">View all results on Bandcamp</a></p>`;
            }
            return html;
        }

        function renderCountrySelector(selected) {
            const options = COUNTRIES.map(([code, name]) =>
                `<option value="${code}" ${code === selected ? 'selected' : ''}>${name} (${code})</option>`
            ).join('');
            return `
                <div class="store-selector" style="margin-bottom: 15px;">
                    <label>Change Store Country:</label>
                    <select onchange="changeCountry(this.value)">${options}</select>
                </div>
            `;
        }

        function renderItunesSection(itunes, idSuffix) {
            const country = itunes && itunes.country ? itunes.country : currentCountry;
            let html = `<h3>iTunes / Apple Music (${escapeHtml(country)}):</h3>`;
            html += renderCountrySelector(country);
            if (itunes && itunes.products && itunes.products.length > 0) {
                const containerId = `itunes-products-${idSuffix}`;
                html += `<p>Browse tracks:</p>`;
                html += `
                    <div class="carousel-container">
                        <button class="carousel-arrow prev" onclick="scrollCarousel('prev', '${containerId}')">‹</button>
                        <button class="carousel-arrow next" onclick="scrollCarousel('next', '${containerId}')">›</button>
                        <div class="tracks-container" id="${containerId}">
                `;
                itunes.products.forEach(product => {
                    html += `
                        <div class="track-item">
                            <div class="product-card" style="width: 100%;">
                                ${product.image ? `<img src="${escapeHtml(safeUrl(product.image))}" alt="${escapeHtml(product.title)}" class="product-image" onerror="this.style.display='none'">` : ''}
                                <div class="product-info">
                                    <div class="product-title">${escapeHtml(product.title)}</div>
                                    ${product.album ? `<div>${escapeHtml(product.album)}</div>` : ''}
                                    ${product.price ? `<div class="product-price">${escapeHtml(product.price)}</div>` : ''}
                                    ${product.preview_audio ? `
                                        <div class="product-preview">
                                            <audio controls preload="none">
                                                <source src="${escapeHtml(safeUrl(product.preview_audio))}" type="audio/mp4">
                                                Your browser does not support the audio element.
                                            </audio>
                                        </div>
                                    ` : ''}
                                    <a href="${escapeHtml(safeUrl(product.url))}" target="_blank" rel="noopener noreferrer">View on Apple Music</a>
                                </div>
                            </div>
                        </div>
                    `;
                });
                html += `
                        </div>
                        <div class="track-counter">Track 1 of ${itunes.products.length}</div>
                    </div>
                `;
            }
            if (itunes && itunes.search_url) {
                html += `<p>🔍 <a href="${escapeHtml(safeUrl(itunes.search_url))}" target="_blank" rel="noopener noreferrer">View all results on Apple Music</a></p>`;
            }
            return html;
        }

        async function changeCountry(country) {
            currentCountry = country;
            if (lastSearchUrl) {
                await searchTrack(lastSearchUrl);
            } else if (lastSearchKeywords) {
                await searchKeywords(lastSearchKeywords);
            }
        }

        async function searchTrack(url) {
            lastSearchUrl = url;
            lastSearchKeywords = null;
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="searching">Searching...</div>';

            try {
                const response = await fetch('/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url, country: currentCountry })
                });

                const data = await response.json();
                
                if (data.error) {
                    resultsDiv.innerHTML = `<div class="error">Error: ${escapeHtml(data.error)}</div>`;
                    return;
                }

                let html = `<h2>Results for: ${escapeHtml(data.title)} by ${escapeHtml(data.artist)}</h2>`;

                // Source section
                html += `<h3>${escapeHtml(data.source)}:</h3>`;
                if (data.download_url) {
                    html += `<p>✅ Download/purchase link found: <a href="${escapeHtml(safeUrl(data.download_url))}" target="_blank" rel="noopener noreferrer">Get Track</a></p>`;
                } else {
                    html += `<p>❌ No download/purchase links found on ${escapeHtml(data.source)}</p>`;
                }
                
                html += renderBandcampSection(data.bandcamp, 'url');
                html += renderItunesSection(data.itunes, 'url');

                resultsDiv.innerHTML = html;
            } catch (error) {
                resultsDiv.innerHTML = `<div class="error">Error: ${escapeHtml(error.message)}</div>`;
            }
        }

        async function searchKeywords(keywords) {
            lastSearchKeywords = keywords;
            lastSearchUrl = null;
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="searching">Searching...</div>';

            try {
                const response = await fetch('/keyword-search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ keywords: keywords, country: currentCountry })
                });

                const data = await response.json();
                
                if (data.error) {
                    resultsDiv.innerHTML = `<div class="error">Error: ${escapeHtml(data.error)}</div>`;
                    return;
                }

                let html = `<h2>Search results for: "${escapeHtml(keywords)}"</h2>`;
                
                // SoundCloud section
                html += '<h3>SoundCloud:</h3>';
                if (data.soundcloud && data.soundcloud.search_url) {
                    if (data.soundcloud.tracks && data.soundcloud.tracks.length > 0) {
                        html += `<p>Browse tracks and check for downloads:</p>`;
                        html += `
                            <div class="carousel-container">
                                <button class="carousel-arrow prev" onclick="scrollCarousel('prev', 'soundcloud-tracks')">‹</button>
                                <button class="carousel-arrow next" onclick="scrollCarousel('next', 'soundcloud-tracks')">›</button>
                                <div class="tracks-container" id="soundcloud-tracks">
                        `;
                        data.soundcloud.tracks.forEach(track => {
                            html += `
                                <div class="track-item">
                                    ${track.embed_html}
                                    <div class="track-actions">
                                        <a href="#" onclick="checkTrack(${escapeHtml(JSON.stringify(safeUrl(track.url)))}); return false;">
                                            Check for downloads
                                        </a>
                                    </div>
                                </div>
                            `;
                        });
                        html += `
                                </div>
                                <div class="track-counter">Track 1 of ${data.soundcloud.tracks.length}</div>
                            </div>
                        `;
                    }
                    html += `<p>🔍 <a href="${escapeHtml(safeUrl(data.soundcloud.search_url))}" target="_blank" rel="noopener noreferrer">View all results on SoundCloud</a></p>`;
                }
                
                html += renderBandcampSection(data.bandcamp, 'keyword');
                html += renderItunesSection(data.itunes, 'keyword');

                resultsDiv.innerHTML = html;
            } catch (error) {
                resultsDiv.innerHTML = `<div class="error">Error: ${escapeHtml(error.message)}</div>`;
            }
        }

        async function checkTrack(trackUrl) {
            const resultsDiv = document.getElementById('results');
            const downloadSection = document.createElement('div');
            downloadSection.innerHTML = '<div class="searching">Checking for downloads...</div>';
            
            // Add the download section after the clicked link
            event.target.parentNode.appendChild(downloadSection);

            try {
                const response = await fetch('/check-track', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ track_url: trackUrl })
                });

                const data = await response.json();
                
                if (data.error) {
                    downloadSection.innerHTML = `<p class="error">Error: ${escapeHtml(data.error)}</p>`;
                    return;
                }

                if (data.download_url) {
                    downloadSection.innerHTML = `<p>✅ Download link found: <a href="${escapeHtml(safeUrl(data.download_url))}" target="_blank" rel="noopener noreferrer">Get Track</a></p>`;
                } else {
                    downloadSection.innerHTML = `<p>❌ No download links found for this track</p>`;
                }

            } catch (error) {
                downloadSection.innerHTML = `<p class="error">Error: ${escapeHtml(error.message)}</p>`;
            }
        }
    </script>
